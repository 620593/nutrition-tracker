<!doctype html>
<!--
  This is the single HTML entry point for the Nutrition Tracker React SPA.
  It provides the root <div id="root"> element that React mounts into, along with
  the correct <script> tag pointing to the Vite-bundled main.jsx entry file.
  When fully implemented, it will also include meta tags for SEO, Open Graph sharing,
  the app favicon, and a Google Fonts link for the chosen brand typeface.
-->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nutrition Tracker</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
